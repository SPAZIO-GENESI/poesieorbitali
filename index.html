<script>
  const map = L.map('map', {
    rotate: true,
    touchRotate: false,
    zoomSnap: 0.5,
    zoomDelta: 0.5
  }).setView([42.35, 13.40], 12);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
     attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
     maxZoom: 19
   }).addTo(map);

  const logDiv = document.getElementById("log");
  function log(t) {
    const line = document.createElement("span");
    line.textContent = t + "\n";
    logDiv.appendChild(line);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // === CURSORE PULSANTE ===
  const cursor = L.circleMarker([0,0], {
    radius: 10,
    color: "#f00000",
    fillColor: "#ff0000",
    fillOpacity: 1,
    weight: 4,
    className: "pulse"
  });

  // === LISTA DEI PERCORSI ===
  const sequence = [
    {
      kmz: "kmz/0_aria_fresca.kmz",
      view: { lat: 42.351803, lng: 13.396453, zoom: 11, bearing: -34 },
      speed: 50,
      pauseAfter: 10
    },
    {
      kmz: "kmz/1_acque_lente.kmz",
      view: { lat: 42.351803, lng: 13.396453, zoom: 11.5, bearing: -30 },
      speed: 50,
      pauseAfter: 10
    },
    {
      kmz: "kmz/3_case_sparse.kmz",
      view: { lat: 42.341117, lng: 13.433158, zoom: 12, bearing: -30 },
      speed: 50,
      pauseAfter: 10
    },
    {
      kmz: "kmz/4_riti_in_auto.kmz",
      view: { lat: 42.356428, lng: 13.456697, zoom: 12.5, bearing: -30 },
      speed: 50,
      pauseAfter: 10
     },
    {
      kmz: "kmz/5_tazze_in_centro.kmz",
      view: { lat: 42.345964, lng: 13.438056, zoom: 13, bearing: -30 },
      speed: 50,
      pauseAfter: 10
     },
    {
      kmz: "kmz/6_la_citta_parla.kmz",
      view: { lat: 42.345714, lng: 13.442750, zoom: 13.5, bearing: -30 },
      speed: 50,
      pauseAfter: 10
     },
    {
      kmz: "kmz/7_lupi_e_lepri.kmz",
      view: { lat: 42.359981, lng: 13.389553, zoom: 14.5, bearing: -30 },
      speed: 50,
      pauseAfter: 10
     }
  ];

  let currentLayerGroup = null;

  // === INTERPOLAZIONE TRA DUE PUNTI ===
  function lerp(a, b, t) {
    return {
      lat: a.lat + (b.lat - a.lat) * t,
      lng: a.lng + (b.lng - a.lng) * t
    };
  }

  // === SPOSTAMENTO CURSORE SU STRADE REALI (OSRM) ===
  async function moveCursor(from, to, group, durationMs) {
    if (!map.hasLayer(cursor)) group.addLayer(cursor);

    let waypoints = null;
    try {
      const url = `https://router.project-osrm.org/route/v1/foot/` +
                  `${from.lng},${from.lat};${to.lng},${to.lat}` +
                  `?overview=full&geometries=geojson`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.code === 'Ok' && data.routes.length > 0) {
        waypoints = data.routes[0].geometry.coordinates.map(c => ({ lat: c[1], lng: c[0] }));
      }
    } catch(e) { /* fallback a linea retta */ }

    if (!waypoints || waypoints.length < 2) {
      waypoints = [from, to];
    }

    const segLengths = [];
    for (let i = 0; i < waypoints.length - 1; i++) {
      const a = waypoints[i], b = waypoints[i + 1];
      const dlat = b.lat - a.lat, dlng = b.lng - a.lng;
      segLengths.push(Math.sqrt(dlat * dlat + dlng * dlng));
    }
    const totalLength = segLengths.reduce((s, v) => s + v, 0);

    return new Promise(resolve => {
      const start = performance.now();

      function tick(now) {
        const t = Math.min((now - start) / durationMs, 1);
        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        const targetDist = ease * totalLength;

        let acc = 0, seg = 0;
        for (seg = 0; seg < segLengths.length; seg++) {
          if (acc + segLengths[seg] >= targetDist) break;
          acc += segLengths[seg];
        }
        const segT = segLengths[seg] > 0 ? (targetDist - acc) / segLengths[seg] : 0;
        const p = lerp(waypoints[seg], waypoints[Math.min(seg + 1, waypoints.length - 1)], segT);
        cursor.setLatLng(p);

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          cursor.setLatLng(to);
          resolve();
        }
      }

      requestAnimationFrame(tick);
    });
  }

  // === ANIMAZIONE DI UNA POLYLINE ===
  function animatePolyline(latlngs, speed, group) {
    return new Promise(resolve => {
      const partial = L.polyline([], { color: "white", weight: 8 });
      group.addLayer(partial);
      group.addLayer(cursor);

      const segLengths = [];
      for (let i = 0; i < latlngs.length - 1; i++) {
        const a = latlngs[i], b = latlngs[i + 1];
        const dlat = b.lat - a.lat, dlng = b.lng - a.lng;
        segLengths.push(Math.sqrt(dlat * dlat + dlng * dlng));
      }
      const totalLength = segLengths.reduce((s, v) => s + v, 0);

      if (totalLength === 0) { resolve(); return; }

      const duration = latlngs.length * speed;
      const startTime = performance.now();
      let frameCount = 0;

      function tick(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const targetDist = t * totalLength;

        let acc = 0, seg = 0;
        for (seg = 0; seg < segLengths.length; seg++) {
          if (acc + segLengths[seg] >= targetDist) break;
          acc += segLengths[seg];
        }

        const segT = segLengths[seg] > 0 ? (targetDist - acc) / segLengths[seg] : 0;
        const p = lerp(latlngs[seg], latlngs[Math.min(seg + 1, latlngs.length - 1)], segT);
        partial.addLatLng(p);
        cursor.setLatLng(p);

        frameCount++;
        if (frameCount % 30 === 0 || t >= 1) {
          log(`t=${(t*100).toFixed(1)}%  ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`);
        }

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          partial.addLatLng(latlngs[latlngs.length - 1]);
          cursor.setLatLng(latlngs[latlngs.length - 1]);
          resolve();
        }
      }

      requestAnimationFrame(tick);
    });
  }

  // === ANIMAZIONE BEARING ===
  function animateBearing(fromBearing, toBearing, durationMs) {
    return new Promise(resolve => {
      const start = performance.now();
      const delta = toBearing - fromBearing;

      function tick(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed / durationMs, 1);
        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        map.setBearing(fromBearing + delta * ease);
        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }

      requestAnimationFrame(tick);
    });
  }

  let currentBearing = 0;

  // === DISSOLVENZA E RIMOZIONE ===
  function fadeAndRemove(group) {
    return new Promise(resolve => {
      group.eachLayer(layer => {
        if (layer._path) {
          layer._path.classList.add("fadeout");
        }
      });

      setTimeout(() => {
        map.removeLayer(group);
        resolve();
      }, 1000);
    });
  }

  // === FLYTO CON ATTESA ===
  function flyToAndWait(lat, lng, zoom, durationSec) {
    return new Promise(resolve => {
      map.flyTo([lat, lng], zoom, {
        duration: durationSec,
        easeLinearity: 0.5
      });
      setTimeout(resolve, durationSec * 1000);
    });
  }

  // === CARICA E ANIMA UN KMZ ===
  async function playKMZ(entry) {
    log(`\n=== Carico ${entry.kmz} ===`);

    const targetBearing = entry.view.bearing ?? 0;
    const bearingAnim = animateBearing(currentBearing, targetBearing, 1000);

    if (currentLayerGroup) {
      await Promise.all([
        fadeAndRemove(currentLayerGroup),
        bearingAnim
      ]);
      currentLayerGroup = null;
    } else {
      await bearingAnim;
    }

    currentBearing = targetBearing;
    currentLayerGroup = L.layerGroup().addTo(map);

    // Opzione B: flyTo animato invece di setView istantaneo
    await flyToAndWait(entry.view.lat, entry.view.lng, entry.view.zoom, 2.5);

    await new Promise(resolve => {
      const kmz = L.kmzLayer();

      kmz.on("load", async e => {
        const root = e.layer;

        root.eachLayer(layer => {
          currentLayerGroup.addLayer(layer);
        });
        map.removeLayer(root);

        const polylines = [];

        currentLayerGroup.eachLayer(layer => {
          if (layer instanceof L.Polyline) {
            const lls = layer.getLatLngs();
            const flat = lls.flat ? lls.flat() : lls;
            polylines.push(flat);
            currentLayerGroup.removeLayer(layer);
          }
        });

        for (let i = 0; i < polylines.length; i++) {
          if (i > 0) {
            const prevEnd = polylines[i - 1][polylines[i - 1].length - 1];
            const nextStart = polylines[i][0];
            const dist = Math.sqrt(
              Math.pow(nextStart.lat - prevEnd.lat, 2) +
              Math.pow(nextStart.lng - prevEnd.lng, 2)
            );
            const moveDuration = Math.min(2000, Math.max(500, dist * 800000));
            await moveCursor(prevEnd, nextStart, currentLayerGroup, moveDuration);
          }
          await animatePolyline(polylines[i], entry.speed, currentLayerGroup);
        }

        log(`Fine ${entry.kmz}, pausa ${entry.pauseAfter}ms`);
        setTimeout(resolve, entry.pauseAfter);
      });

      kmz.load(entry.kmz);
    });
  }

  // === SEQUENZA COMPLETA ===
  async function playSequence() {
    for (const entry of sequence) {
      await playKMZ(entry);
    }
    log("\n=== Sequenza completata ===");
  }

  playSequence();
</script>
